name: Build and Sign Yabause

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupération du code source
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Configuration de l'environnement Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Décodage du Keystore binaire
    - name: Decode Keystore File
      env:
        ENCODED_STRING: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$ENCODED_STRING" | base64 --decode > release.jks

    # 4. Correctif automatique des liens HTTP non sécurisés
    - name: Fix Insecure Maven Repository URLs
      run: |
        find yabause/src/android/ -name "*.gradle" -type f -exec sed -i 's|http://fan-adn.github.io|https://fan-adn.github.io|g' {} +

    # 5. Nettoyage de la réplique en double dans le fichier russe
    - name: Fix Duplicate String in Russian Localization
      shell: python
      run: |
        import os
        file_path = "yabause/src/android/app/src/main/res/values-ru/strings.xml"
        if os.path.exists(file_path):
            with open(file_path, "r", encoding="utf-8") as f:
                lines = f.readlines()
            
            new_lines = []
            found = False
            for line in lines:
                if 'name="attachment_summary_off"' in line:
                    if not found:
                        new_lines.append(line)
                        found = True  # On garde la première occurrence
                    else:
                        continue      # On ignore la deuxième occurrence (doublon)
                else:
                    new_lines.append(line)
            
            with open(file_path, "w", encoding="utf-8") as f:
                f.writelines(new_lines)
            print("Doublon nettoyé avec succès !")

    # 6. Compilation du projet
    - name: Build Release Artifact
      run: |
        cd yabause/src/android
        chmod +x gradlew
        ./gradlew assembleRelease

    # 7. Signature de l'application
    - name: Sign Android Release
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: yabause/src/android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

    # 8. Exportation du fichier final signé
    - name: Upload Signed Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Yabause-Signed-Build
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
