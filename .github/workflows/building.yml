name: Build and Sign Yabause

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupération du code source
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Configuration de l'environnement Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Décodage du Keystore binaire
    - name: Decode Keystore File
      env:
        ENCODED_STRING: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$ENCODED_STRING" | base64 --decode > release.jks

    # 4. Correctif automatique des liens HTTP non sécurisés
    - name: Fix Insecure Maven Repository URLs
      run: |
        find yabause/src/android/ -name "*.gradle" -type f -exec sed -i 's|http://fan-adn.github.io|https://fan-adn.github.io|g' {} +

    # 5. Nettoyage global de TOUS les doublons dans le fichier russe
    - name: Fix All Duplicate Strings in Russian Localization
      shell: python
      run: |
        import os
        import re
        
        file_path = "yabause/src/android/app/src/main/res/values-ru/strings.xml"
        if os.path.exists(file_path):
            with open(file_path, "r", encoding="utf-8") as f:
                lines = f.readlines()
            
            new_lines = []
            seen_names = set()
            deleted_count = 0
            
            for line in lines:
                # Détecte l'identifiant de la ressource string
                match = re.search(r'<string\s+name="([^"]+)"', line)
                if match:
                    string_name = match.group(1)
                    if string_name in seen_names:
                        deleted_count += 1
                        continue # On ignore la ligne si l'identifiant a déjà été vu
                    seen_names.add(string_name)
                new_lines.append(line)
            
            with open(file_path, "w", encoding="utf-8") as f:
                f.writelines(new_lines)
            print(f"Nettoyage réussi : {deleted_count} chaînes en double supprimées.")

    # 6. Compilation du projet
    - name: Build Release Artifact
      run: |
        cd yabause/src/android
        chmod +x gradlew
        ./gradlew assembleRelease

    # 7. Signature de l'application
    - name: Sign Android Release
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: yabause/src/android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

    # 8. Exportation du fichier final signé
    - name: Upload Signed Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Yabause-Signed-Build
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
